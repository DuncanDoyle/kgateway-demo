apiVersion: gateway.kgateway.dev/v1alpha1	
kind: TrafficPolicy
metadata:
  name: lrl-traffic-policy-gateway
  namespace: ingress-gw
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: gw
  rateLimit:
    local:
      tokenBucket:
        maxTokens: 1
        tokensPerFill: 1
        fillInterval: 100s