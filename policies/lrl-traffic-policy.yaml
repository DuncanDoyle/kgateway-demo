apiVersion: gateway.kgateway.dev/v1alpha1	
kind: TrafficPolicy
metadata:
  name: lrl-traffic-policy
  namespace: default
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: api-example-com
  rateLimit:
    local:
      tokenBucket:
        maxTokens: 1
        tokensPerFill: 1
        fillInterval: 100s